<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파벳 컵 내비게이터 (드래그 & 리스폰)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* 터치/마우스 드래그 시 브라우저 기본 스크롤 방지 */
            touch-action: none; 
        }

        /* U자 형태의 컵 (시각적 테두리) */
        #box-container {
            position: relative;
            width: 300px;
            height: 500px;
            border-left: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
        }

        /* 개별 알파벳 스타일 */
        .letter {
            position: absolute;
            color: #777777; /* 기본 연한 회색 */
            font-size: 42px;
            font-weight: bold;
            cursor: grab; /* 잡을 수 있다는 커서 표시 */
            user-select: none; /* 텍스트 선택 방지 (드래그 꼬임 방지) */
            transform-origin: center;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .letter:active {
            cursor: grabbing; /* 잡고 있을 때 커서 */
        }

        /* 마우스 호버 시 빛나는 흰색 */
        .letter:hover {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 100;
        }

        #description {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #777;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="box-container"></div>
    <div id="description">글자를 드래그해서 컵 밖으로 던져보세요. 사라지면 위에서 다시 떨어집니다.</div>

    <script>
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events;

        const engine = Engine.create();
        const world = engine.world;

        const container = document.getElementById('box-container');
        const boxWidth = 300;
        const boxHeight = 500;
        const wallThickness = 100; 

        // 바닥 및 양쪽 벽 생성 (벽 높이를 boxHeight로 맞춰서 위로 드래그해 빼낼 수 있게 함)
        const ground = Bodies.rectangle(boxWidth / 2, boxHeight + wallThickness / 2, boxWidth, wallThickness, { isStatic: true });
        const leftWall = Bodies.rectangle(-wallThickness / 2, boxHeight / 2, wallThickness, boxHeight, { isStatic: true });
        const rightWall = Bodies.rectangle(boxWidth + wallThickness / 2, boxHeight / 2, wallThickness, boxHeight, { isStatic: true });

        Composite.add(world, [ground, leftWall, rightWall]);

        // 글자 객체들을 관리할 배열 [{char, body, el}]
        let letterObjects = [];
        const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

        // 드래그 컨트롤 설정
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);

        // 드래그 중 클릭 방지 로직
        let isDragging = false;
        Events.on(mouseConstraint, 'startdrag', () => { isDragging = true; });
        Events.on(mouseConstraint, 'enddrag', () => {
            // 드래그가 끝나고 아주 짧은 시간 뒤에 false로 변경하여 클릭 이벤트와 겹치는 것 방지
            setTimeout(() => { isDragging = false; }, 50);
        });

        // 개별 글자 생성 함수 (초기 세팅 & 리스폰 시 재사용)
        function createLetter(char, x, y) {
            const el = document.createElement('div');
            el.className = 'letter';
            el.innerText = char;
            container.appendChild(el);

            const size = 35;
            const body = Bodies.rectangle(x, y, size, size, {
                restitution: 0.4,
                friction: 0.3,
                density: 0.05
            });

            // 클릭 이벤트 (메뉴 이동)
            el.addEventListener('click', () => {
                if (isDragging) return; // 드래그 중이거나 방금 드래그가 끝났으면 클릭 무시
                
                const lowerChar = char.toLowerCase();
                const url = `${lowerChar}.html`;
                
                // window.location.href = url;
                alert(`'${char}' 클릭됨 -> ${url} 로 이동!`);
            });

            Composite.add(world, body);
            letterObjects.push({ char, body, el });
        }

        // 초기 글자 투하
        alphabets.forEach((char, index) => {
            const x = Math.random() * (boxWidth - 60) + 30;
            const y = -(Math.random() * 200) - (index * 50);
            createLetter(char, x, y);
        });

        const runner = Runner.create();
        Runner.run(runner, engine);

        // 프레임 업데이트 및 아웃바운드(낙하) 체크 로직
        function update() {
            // 배열을 뒤에서부터 순회 (도중에 삭제해도 인덱스가 꼬이지 않게)
            for (let i = letterObjects.length - 1; i >= 0; i--) {
                const obj = letterObjects[i];
                const body = obj.body;
                const el = obj.el;

                // DOM 위치 및 회전 동기화
                el.style.left = (body.position.x - el.offsetWidth / 2) + 'px';
                el.style.top = (body.position.y - el.offsetHeight / 2) + 'px';
                el.style.transform = `rotate(${body.angle}rad)`;

                // 컵 밖으로 던져져서 화면 아래로 떨어졌는지 체크 (상자 높이보다 300px 더 아래로 떨어지면)
                if (body.position.y > boxHeight + 300) {
                    // 1. 기존 객체 제거 (물리 엔진 & DOM & 배열)
                    Matter.Composite.remove(world, body);
                    el.remove();
                    letterObjects.splice(i, 1);

                    // 2. 새로운 글자 리스폰 (컵 상단에서)
                    const newX = Math.random() * (boxWidth - 60) + 30;
                    const newY = -(Math.random() * 100) - 50; 
                    createLetter(obj.char, newX, newY);
                }
            }
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
