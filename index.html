<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파벳 컵 내비게이터 (90px & 고마찰력)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            touch-action: none; 
        }

        /* 다시 원래 컵 크기로 복구 (300 x 500) */
        #box-container {
            position: relative;
            width: 300px;  
            height: 500px; 
            border-left: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
        }

        .letter {
            position: absolute;
            color: #777777;
            font-size: 90px; /* 90px로 조정 */
            font-weight: bold;
            cursor: grab;
            user-select: none;
            transform-origin: center;
            transition: color 0.2s ease, text-shadow 0.2s ease;
            line-height: 1; 
        }

        .letter:active {
            cursor: grabbing;
        }

        .letter:hover {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 100;
        }

        #description {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #777;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="box-container"></div>
    <div id="description">크기 90px, 높은 마찰력 적용. 좁은 컵에서도 안정적으로 쌓임.</div>

    <script>
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint;

        const engine = Engine.create();
        const world = engine.world;

        const container = document.getElementById('box-container');
        const boxWidth = 300; // 원래 너비
        const boxHeight = 500; // 원래 높비
        const wallThickness = 100; 

        const ground = Bodies.rectangle(boxWidth / 2, boxHeight + wallThickness / 2, boxWidth, wallThickness, { isStatic: true });
        const leftWall = Bodies.rectangle(-wallThickness / 2, boxHeight / 2, wallThickness, boxHeight * 2, { isStatic: true });
        const rightWall = Bodies.rectangle(boxWidth + wallThickness / 2, boxHeight / 2, wallThickness, boxHeight * 2, { isStatic: true });

        Composite.add(world, [ground, leftWall, rightWall]);

        let letterObjects = [];
        const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);

        function createLetter(char, x, y) {
            const el = document.createElement('div');
            el.className = 'letter';
            el.innerText = char;
            container.appendChild(el);

            // 90px 폰트에 맞춘 물리 영역 (약 72px)
            const size = 72; 
            const body = Bodies.rectangle(x, y, size, size, {
                restitution: 0.1,  /* 탄성 대폭 감소: 안 튀어오름 */
                friction: 0.8,     /* 마찰력 대폭 증가: 잘 미끄러지지 않음 */
                frictionStatic: 2, /* 정지 마찰력 증가: 일단 멈추면 꽉 물림 */
                density: 0.05
            });

            let startX = 0, startY = 0;

            el.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
            });

            el.addEventListener('mouseup', (e) => {
                const diffX = Math.abs(e.clientX - startX);
                const diffY = Math.abs(e.clientY - startY);

                if (diffX < 5 && diffY < 5) {
                    const lowerChar = char.toLowerCase();
                    const url = `${lowerChar}.html`;
                    
                    // window.location.href = url;
                    alert(`'${char}' 클릭됨 -> ${url} 로 이동!`);
                }
            });

            Composite.add(world, body);
            letterObjects.push({ char, body, el });
        }

        // 좁은 곳에 큰 글자들이 쏟아지므로, 떨어지는 간격(y)을 넓혀서 병목 현상 방지
        alphabets.forEach((char, index) => {
            const x = Math.random() * (boxWidth - 100) + 50;
            const y = -(Math.random() * 500) - (index * 100);
            createLetter(char, x, y);
        });

        const runner = Runner.create();
        Runner.run(runner, engine);

        function update() {
            for (let i = letterObjects.length - 1; i >= 0; i--) {
                const obj = letterObjects[i];
                const body = obj.body;
                const el = obj.el;

                el.style.left = (body.position.x - el.offsetWidth / 2) + 'px';
                el.style.top = (body.position.y - el.offsetHeight / 2) + 'px';
                el.style.transform = `rotate(${body.angle}rad)`;

                if (body.position.y > boxHeight + 300) {
                    Matter.Composite.remove(world, body);
                    el.remove();
                    letterObjects.splice(i, 1);

                    const newX = Math.random() * (boxWidth - 100) + 50;
                    const newY = -(Math.random() * 200) - 100; 
                    createLetter(obj.char, newX, newY);
                }
            }
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
