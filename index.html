<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파벳 컵 내비게이터 (83px & 텍스트 제거)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            touch-action: none; 
        }

        #box-container {
            position: relative;
            width: 300px;  
            height: 500px; 
            border-left: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
        }

        .letter {
            position: absolute;
            color: #777777;
            font-size: 83px; /* 83px로 조정 */
            font-weight: bold;
            cursor: grab;
            user-select: none;
            transform-origin: center;
            transition: color 0.2s ease, text-shadow 0.2s ease;
            line-height: 1; 
        }

        .letter:active {
            cursor: grabbing;
        }

        .letter:hover {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="box-container"></div>

    <script>
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint;

        const engine = Engine.create();
        const world = engine.world;

        const container = document.getElementById('box-container');
        const boxWidth = 300; 
        const boxHeight = 500;
        const wallThickness = 100; 

        // 상자 벽
        const ground = Bodies.rectangle(boxWidth / 2, boxHeight + wallThickness / 2, boxWidth, wallThickness, { isStatic: true });
        const leftWall = Bodies.rectangle(-wallThickness / 2, boxHeight / 2, wallThickness, boxHeight * 2, { isStatic: true });
        const rightWall = Bodies.rectangle(boxWidth + wallThickness / 2, boxHeight / 2, wallThickness, boxHeight * 2, { isStatic: true });

        Composite.add(world, [ground, leftWall, rightWall]);

        let letterObjects = [];
        const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

        let currentDrag = null; 

        function createLetter(char, x, y) {
            const el = document.createElement('div');
            el.className = 'letter';
            el.innerText = char;
            container.appendChild(el);

            const size = 66; // 83px 폰트용 물리 박스 크기 보정 (약 80%)
            const body = Bodies.rectangle(x, y, size, size, {
                restitution: 0.1,  
                friction: 0.8,     
                frictionStatic: 2, 
                density: 0.05
            });

            // 마우스/터치 시작 이벤트
            const handleStart = (clientX, clientY) => {
                if (currentDrag) return; 
                
                const rect = container.getBoundingClientRect();
                const mouseX = clientX - rect.left;
                const mouseY = clientY - rect.top;

                const constraint = Constraint.create({
                    pointA: { x: mouseX, y: mouseY },
                    bodyB: body,
                    stiffness: 0.2, 
                    damping: 0.1,
                    render: { visible: false }
                });
                
                Composite.add(world, constraint);
                
                currentDrag = { char, startX: clientX, startY: clientY, isClick: true, constraint };
            };

            el.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
            el.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});

            Composite.add(world, body);
            letterObjects.push({ char, body, el });
        }

        // 초기 글자 투하
        alphabets.forEach((char, index) => {
            const x = Math.random() * (boxWidth - 100) + 50;
            const y = -(Math.random() * 500) - (index * 100);
            createLetter(char, x, y);
        });

        // 커스텀 드래그 이동/종료 로직
        const handleMove = (clientX, clientY) => {
            if (currentDrag) {
                const rect = container.getBoundingClientRect();
                currentDrag.constraint.pointA = { 
                    x: clientX - rect.left, 
                    y: clientY - rect.top 
                };

                if (Math.abs(clientX - currentDrag.startX) > 5 || Math.abs(clientY - currentDrag.startY) > 5) {
                    currentDrag.isClick = false;
                }
            }
        };

        const handleEnd = () => {
            if (currentDrag) {
                Composite.remove(world, currentDrag.constraint);
                
                if (currentDrag.isClick) {
                    const url = `${currentDrag.char.toLowerCase()}.html`;
                    // window.location.href = url;
                    alert(`'${currentDrag.char}' 클릭됨 -> ${url} 로 이동!`);
                }
                currentDrag = null;
            }
        };

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);
        window.addEventListener('mouseleave', handleEnd); 

        const runner = Runner.create();
        Runner.run(runner, engine);

        // 프레임 업데이트
        function update() {
            for (let i = letterObjects.length - 1; i >= 0; i--) {
                const obj = letterObjects[i];
                const body = obj.body;
                const el = obj.el;

                el.style.left = (body.position.x - el.offsetWidth / 2) + 'px';
                el.style.top = (body.position.y - el.offsetHeight / 2) + 'px';
                el.style.transform = `rotate(${body.angle}rad)`;

                // 컵 밖으로 던져졌는지 확인
                if (body.position.y > boxHeight + 300) {
                    Matter.Composite.remove(world, body);
                    el.remove();
                    letterObjects.splice(i, 1);

                    const newX = Math.random() * (boxWidth - 100) + 50;
                    const newY = -(Math.random() * 200) - 100; 
                    createLetter(obj.char, newX, newY);
                }
            }
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
