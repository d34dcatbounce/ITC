<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파벳 컵 내비게이터 (95px & 드래그 오류 수정)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            touch-action: none; 
        }

        /* U자 상자 크기를 폰트 크기에 맞춰서 좀 더 키움 */
        #box-container {
            position: relative;
            width: 400px;  /* 300px -> 400px */
            height: 600px; /* 500px -> 600px */
            border-left: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
        }

        .letter {
            position: absolute;
            color: #777777;
            font-size: 95px; /* 요청한 95px 폰트 크기 */
            font-weight: bold;
            cursor: grab;
            user-select: none;
            transform-origin: center;
            transition: color 0.2s ease, text-shadow 0.2s ease;
            line-height: 1; /* 높이 여백 최소화 */
        }

        .letter:active {
            cursor: grabbing;
        }

        .letter:hover {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 100;
        }

        #description {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #777;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="box-container"></div>
    <div id="description">글자 크기 95px 적용 완료. 드래그/클릭 충돌 해결.</div>

    <script>
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint;

        const engine = Engine.create();
        const world = engine.world;

        const container = document.getElementById('box-container');
        const boxWidth = 400; 
        const boxHeight = 600;
        const wallThickness = 100; 

        // 상자 벽 만들기
        const ground = Bodies.rectangle(boxWidth / 2, boxHeight + wallThickness / 2, boxWidth, wallThickness, { isStatic: true });
        const leftWall = Bodies.rectangle(-wallThickness / 2, boxHeight / 2, wallThickness, boxHeight, { isStatic: true });
        const rightWall = Bodies.rectangle(boxWidth + wallThickness / 2, boxHeight / 2, wallThickness, boxHeight, { isStatic: true });

        Composite.add(world, [ground, leftWall, rightWall]);

        let letterObjects = [];
        const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

        // 드래그 설정 (Matter.js 내장 마우스 컨트롤)
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);

        // 글자 생성 함수
        function createLetter(char, x, y) {
            const el = document.createElement('div');
            el.className = 'letter';
            el.innerText = char;
            container.appendChild(el);

            // ★ 해결 2: 물리 엔진 크기 동기화 (95px 폰트의 약 80% 수준인 75px로 설정)
            const size = 75; 
            const body = Bodies.rectangle(x, y, size, size, {
                restitution: 0.4,
                friction: 0.3,
                density: 0.05
            });

            // ★ 해결 1: 마우스 눌렀을 때와 뗐을 때의 좌표 차이로 클릭 vs 드래그 구분
            let startX = 0, startY = 0;

            el.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
            });

            el.addEventListener('mouseup', (e) => {
                const diffX = Math.abs(e.clientX - startX);
                const diffY = Math.abs(e.clientY - startY);

                // 마우스가 이동한 거리가 5px 미만이면 클릭으로 인정
                if (diffX < 5 && diffY < 5) {
                    const lowerChar = char.toLowerCase();
                    const url = `${lowerChar}.html`;
                    
                    // window.location.href = url;
                    alert(`'${char}' 클릭됨 -> ${url} 로 이동!`);
                }
            });

            Composite.add(world, body);
            letterObjects.push({ char, body, el });
        }

        // 초기 글자 투하 (글자가 커졌으므로 y축 시작 위치를 더 높게 잡아서 천천히 쏟아지게 함)
        alphabets.forEach((char, index) => {
            const x = Math.random() * (boxWidth - 100) + 50;
            const y = -(Math.random() * 800) - (index * 80);
            createLetter(char, x, y);
        });

        const runner = Runner.create();
        Runner.run(runner, engine);

        // 프레임 업데이트
        function update() {
            for (let i = letterObjects.length - 1; i >= 0; i--) {
                const obj = letterObjects[i];
                const body = obj.body;
                const el = obj.el;

                // DOM 위치 및 회전 동기화
                el.style.left = (body.position.x - el.offsetWidth / 2) + 'px';
                el.style.top = (body.position.y - el.offsetHeight / 2) + 'px';
                el.style.transform = `rotate(${body.angle}rad)`;

                // 컵 밖으로 던져졌는지 확인
                if (body.position.y > boxHeight + 300) {
                    Matter.Composite.remove(world, body);
                    el.remove();
                    letterObjects.splice(i, 1);

                    const newX = Math.random() * (boxWidth - 100) + 50;
                    const newY = -(Math.random() * 200) - 100; 
                    createLetter(obj.char, newX, newY);
                }
            }
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
